<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dein Tankstellen- und Wetterbericht</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background-color: #1a1a1a; /* Dunkler Hintergrund */
            color: #e0e0e0; /* Helle Textfarbe */
            line-height: 1.6;
        }
        .card {
            background: #282828; /* Etwas helleres Dunkel für Kacheln */
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); /* Dunklerer Schatten */
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #8ab4f8; /* Helleres Blau für H1 */
        }
        .date {
            color: #a0a0a0; /* Etwas entsättigt für Datum */
            font-size: 14px;
            margin-bottom: 24px;
        }
        .gemini-text {
            font-size: 16px;
            white-space: pre-line;
        }
        #chart {
            width: 100%;
            height: 400px;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #808080; /* Entsättigt für Footer */
            margin-top: 20px;
        }

        /* Wetterkarten spezifische Stile */
        .weather-card-content {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        .weather-icon {
            font-size: 48px; /* Größeres Icon */
            margin-right: 15px;
            line-height: 1; /* Zeilenhöhe für Emojis anpassen */
        }
        .weather-details {
            flex-grow: 1;
        }
        .weather-temp {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .weather-description {
            font-size: 18px;
            color: #c0c0c0;
            margin-bottom: 5px;
        }
        .weather-wind {
            font-size: 14px;
            color: #a0a0a0;
        }

        /* Macht die Legende auf dem Handy schöner */
        .legendtext {
            font-size: 12px !important;
            color: #e0e0e0 !important; /* Sicherstellen, dass Legendentext hell ist */
        }
    </style>
</head>
<body>

    <h1>Guten Morgen!</h1>
    <div class="date">Samstag, 11. April 2026</div>

    <!-- Wetter Kachel für Frankfurt -->
    <div class="card">
        <strong style="display: block;">Wetter in Frankfurt</strong>
        <div class="weather-card-content">
            <span class="weather-icon">☀️</span> <!-- Hier kann das Icon dynamisch eingefügt werden -->
            <div class="weather-details">
                <div class="weather-temp">22°C</div>
                <div class="weather-description">Geringe Bewölkung</div>
                <div class="weather-wind">Wind: 10 km/h aus SW</div>
            </div>
        </div>
    </div>

    <!-- Wetter Kachel für Offenbach Bieber -->
    <div class="card">
        <strong style="display: block;">Wetter in Offenbach Bieber</strong>
        <div class="weather-card-content">
            <span class="weather-icon">🌧️</span> <!-- Hier kann das Icon dynamisch eingefügt werden -->
            <div class="weather-details">
                <div class="weather-temp">18°C</div>
                <div class="weather-description">Leichter Regen</div>
                <div class="weather-wind">Wind: 15 km/h aus NW</div>
            </div>
        </div>
    </div>

    <div class="card">
        <strong style="display: block; margin-bottom: 15px;">Preisvergleich Tankstellen</strong>
        <div id="chart"></div>
    </div>

    <div class="footer">Generiert von n8n & Gemini AI • Datenquelle: SQL DB</div>

        const config = {

        // Chart erstellen

</body>
</html>
