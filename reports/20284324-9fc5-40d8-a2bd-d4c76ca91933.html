<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dein Täglicher Bericht</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background-color: #f8f9fa;
            color: #212529;
            line-height: 1.6;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        /* Neue Klasse für dunkle Kacheln */
        .dark-card {
            background: #2c2c2c; /* Dunkler Hintergrund */
            color: #f8f9fa; /* Heller Text */
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); /* Etwas dunklerer Schatten */
        }
        .dark-card h2 {
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 10px;
            color: #8ab4f8; /* Heller Blau für Überschriften im Dark Mode */
        }
        h1 { font-size: 24px; margin-bottom: 8px; color: #1a73e8; }
        .date { color: #6c757d; font-size: 14px; margin-bottom: 24px; }
        .gemini-text { font-size: 16px; white-space: pre-line; }
        #chart { width: 100%; height: 400px; }
        .footer { text-align: center; font-size: 12px; color: #adb5bd; margin-top: 20px; }
        
        /* Macht die Legende auf dem Handy schöner */
        .legendtext { font-size: 12px !important; }

        /* Wetterkachel-spezifische Stile */
        .weather-info {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .weather-icon {
            font-size: 40px; /* Große Ikone */
            margin-right: 15px;
            line-height: 1; /* Vertikale Ausrichtung */
        }
        .weather-temp {
            font-size: 36px;
            font-weight: bold;
        }
        .weather-description {
            font-size: 18px;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .weather-minmax {
            font-size: 16px;
            color: #bbbbbb; /* Etwas weniger prominent für Min/Max */
        }
    </style>
</head>
<body>

    <h1>Guten Morgen!</h1>
    <div class="date">Mittwoch, 25. März 2026</div>

    <!-- Wetterkachel für Frankfurt -->
    <div class="dark-card">
        <h2>Wetter in Frankfurt</h2>
        <div class="weather-info">
            <span class="weather-icon">☀️</span> <!-- Beispiel-Icon, kann dynamisch ersetzt werden -->
            <div>
                <div class="weather-temp">18°C</div>
                <div class="weather-description">Sonnig und klar</div>
            </div>
        </div>
        <div class="weather-minmax">Tageshöchstwert: 20°C | Tiefstwert: 10°C</div>
    </div>

    <!-- Wetterkachel für Offenbach Bieber -->
    <div class="dark-card">
        <h2>Wetter in Offenbach Bieber</h2>
        <div class="weather-info">
            <span class="weather-icon">☁️</span> <!-- Beispiel-Icon -->
            <div>
                <div class="weather-temp">16°C</div>
                <div class="weather-description">Leicht bewölkt</div>
            </div>
        </div>
        <div class="weather-minmax">Tageshöchstwert: 17°C | Tiefstwert: 9°C</div>
    </div>

    <div class="card">
        <strong style="display: block; margin-bottom: 15px;">Preisvergleich Tankstellen</strong>

    </div>

</body>
</html>
