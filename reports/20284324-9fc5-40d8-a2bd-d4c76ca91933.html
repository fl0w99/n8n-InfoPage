<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dein Täglicher Bericht</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background-color: #f8f9fa; /* Leichter Hintergrund */
            color: #212529;
            line-height: 1.6;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h1 { 
            font-size: 24px; 
            margin-bottom: 8px; 
            color: #1a73e8; /* Google Blue */
        }
        .date { 
            color: #6c757d; 
            font-size: 14px; 
            margin-bottom: 24px; 
        }
        .gemini-text { 
            font-size: 16px; 
            white-space: pre-line; 
        }
        #chart { 
            width: 100%; 
            height: 400px; 
        }
        .footer { 
            text-align: center; 
            font-size: 12px; 
            color: #adb5bd; 
            margin-top: 20px; 
        }
        
        /* Macht die Legende auf dem Handy schöner */
        .legendtext { 
            font-size: 12px !important; 
        }

        /* Zusätzliche Styles für Wetter-Kacheln */
        .weather-card {
            display: flex;
            flex-direction: column;
            align-items: center; /* Zentriert Inhalt horizontal */
            text-align: center;
        }
        .weather-city {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #343a40; /* Dunklerer Text für Prominenz */
        }
        .weather-info {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .weather-icon {
            font-size: 48px; /* Große Emoji-Icons */
            margin-right: 15px;
            line-height: 1; /* Anpassung für besseres Alignment */
        }
        .weather-temp {
            font-size: 48px;
            font-weight: bold;
            color: #1a73e8; /* Blauer Farbton für die Temperatur */
        }
        .weather-description {
            font-size: 18px;
            margin-bottom: 5px;
            color: #495057;
        }
        .weather-details {
            font-size: 14px;
            color: #6c757d;
        }
    </style>
</head>
<body>

    <h1>Guten Morgen!</h1>
    <div class="date">Sonntag, 29. März 2026</div> <!-- Datum wird von n8n dynamisch ersetzt -->

    <div class="card weather-card">
        <strong class="weather-city">Wetter für Frankfurt</strong>
        <div class="weather-info">
            <span class="weather-icon">☀️</span> <!-- Beispiel-Icon, kann von n8n ersetzt werden -->
            <span class="weather-temp">22°C</span> <!-- Temperatur wird von n8n ersetzt -->
        </div>
        <div class="weather-description">Sonnig und klar</div> <!-- Beschreibung wird von n8n ersetzt -->
        <div class="weather-details">Gefühlt 20°C • Wind 10 km/h aus NW</div> <!-- Details werden von n8n ersetzt -->
    </div>

    <div class="card weather-card">
        <strong class="weather-city">Wetter für Offenbach Bieber</strong>
        <div class="weather-info">
            <span class="weather-icon">☁️</span> <!-- Beispiel-Icon, kann von n8n ersetzt werden -->
            <span class="weather-temp">18°C</span> <!-- Temperatur wird von n8n ersetzt -->
        </div>
        <div class="weather-description">Leicht bewölkt</div> <!-- Beschreibung wird von n8n ersetzt -->
        <div class="weather-details">Gefühlt 17°C • Wind 8 km/h aus SW</div> <!-- Details werden von n8n ersetzt -->

    <div class="card">
        <strong style="display: block; margin-bottom: 15px;">Preisvergleich Tankstellen</strong>

    </div>

</body>
</html>
