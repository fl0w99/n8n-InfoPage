<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dein Täglicher Bericht</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background-color: #121212; /* Dunkler Hintergrund */
            color: #e0e0e0; /* Helle Textfarbe */
            line-height: 1.6;
        }
        .card {
            background: #1e1e1e; /* Dunklere Kartenfarbe */
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); /* Angepasster Schatten für dunkles Design */
            color: #e0e0e0;
        }
        h1 {
            font-size: 28px; /* Etwas größer für Betonung */
            margin-bottom: 8px;
            color: #bb86fc; /* Akzentfarbe für Überschriften */
        }
        h2 { /* Für Kacheltitel */
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 10px;
            color: #bb86fc;
        }
        .date {
            color: #a0a0a0; /* Gedämpfte Farbe für das Datum */
            font-size: 14px;
            margin-bottom: 24px;
        }
        .gemini-text {
            font-size: 16px;
            white-space: pre-line;
        }
        #chart {
            width: 100%;
            height: 400px;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #888888; /* Gedämpfte Farbe für den Footer */
            margin-top: 20px;
        }

        /* Macht die Legende auf dem Handy schöner */
        .legendtext { font-size: 12px !important; }

        /* Styles für Wetterkarten */
        .weather-card .location {
            font-weight: bold;
            color: #bb86fc; /* Akzentfarbe */
        }
        .weather-details {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .weather-icon {
            font-size: 36px;
            margin-right: 15px;
            line-height: 1; /* Stellt sicher, dass das Icon gut sitzt */
        }
        .temperature {
            font-size: 32px;
            font-weight: bold;
            margin-right: 15px;
        }
        .description {
            font-size: 18px;
            color: #b0b0b0;
        }
        .additional-info {
            font-size: 14px;
            color: #a0a0a0;
        }
    </style>
</head>
<body>

    <h1>Guten Morgen!</h1>
    <div class="date">Montag, 23. März 2026</div> <!-- Platzhalter für dynamisches Datum von n8n -->

    <!-- Wetterkarte Frankfurt -->
    <div class="card weather-card">
        <h2>Wetter <span class="location">Frankfurt</span></h2>
        <div class="weather-details">
            <span class="weather-icon">☀️</span> <!-- Platzhalter: {{FRANKFURT_ICON}} -->
            <span class="temperature">22°C</span> <!-- Platzhalter: {{FRANKFURT_TEMP}} -->
            <span class="description">Sonnig</span> <!-- Platzhalter: {{FRANKFURT_DESC}} -->
        </div>
        <div class="additional-info">
            Wind: <span class="wind">10 km/h O</span> | <!-- Platzhalter: {{FRANKFURT_WIND}} -->
            Luftfeuchtigkeit: <span class="humidity">60%</span> <!-- Platzhalter: {{FRANKFURT_HUMIDITY}} -->
        </div>
    </div>

    <!-- Wetterkarte Offenbach Bieber -->
    <div class="card weather-card">
        <h2>Wetter <span class="location">Offenbach Bieber</span></h2>
        <div class="weather-details">
            <span class="weather-icon">☁️</span> <!-- Platzhalter: {{OFFENBACH_ICON}} -->
            <span class="temperature">20°C</span> <!-- Platzhalter: {{OFFENBACH_TEMP}} -->
            <span class="description">Leicht bewölkt</span> <!-- Platzhalter: {{OFFENBACH_DESC}} -->
        </div>
        <div class="additional-info">
            Wind: <span class="wind">8 km/h NW</span> | <!-- Platzhalter: {{OFFENBACH_WIND}} -->
            Luftfeuchtigkeit: <span class="humidity">65%</span> <!-- Platzhalter: {{OFFENBACH_HUMIDITY}} -->
        </div>
    </div>

        <div id="chart"></div>
    </div>

</body>
</html>
