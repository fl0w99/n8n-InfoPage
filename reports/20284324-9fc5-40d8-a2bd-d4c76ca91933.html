<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dein Täglicher Bericht</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background-color: #f8f9fa;
            color: #212529;
            line-height: 1.6;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        /* Dunkles Design für Wetterkarten */
        .card.dark-card {
            background: #2c3e50; /* Dunkelblau-Grau */
            color: #ecf0f1; /* Helle Schrift */
        }
        .card.dark-card h2 {
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 15px;
            color: #3498db; /* Helles Blau für Überschriften */
        }
        .card.dark-card .weather-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card.dark-card .weather-info > div {
            display: flex;
            align-items: center;
        }
        .card.dark-card .weather-icon {
            width: 50px;
            height: 50px;
            margin-right: 10px;
            /* Optional: Icons invertieren, falls sie für hellen Hintergrund optimiert sind */
            /* filter: invert(0.9); */
        }
        .card.dark-card .weather-temp {
            font-size: 32px;
            font-weight: bold;
            color: #a8dadc; /* Helles Türkis für Temperatur */
        }
        .card.dark-card .weather-desc,
        .card.dark-card .weather-details p {
            margin: 0;
            font-size: 14px;
            color: #bdc3c7; /* Leicht dunkleres Hellgrau */
        }

        h1 { font-size: 24px; margin-bottom: 8px; color: #1a73e8; }
        .date { color: #6c757d; font-size: 14px; margin-bottom: 24px; }
        .gemini-text { font-size: 16px; white-space: pre-line; }
        #chart { width: 100%; height: 400px; }
        .footer { text-align: center; font-size: 12px; color: #adb5bd; margin-top: 20px; }
        
        /* Macht die Legende auf dem Handy schöner */
        .legendtext { font-size: 12px !important; }
    </style>
</head>
<body>

    <h1>Guten Morgen!</h1>
    <div class="date">Donnerstag, 26. März 2026</div>

    <!-- Wetterkarte für Frankfurt -->
    <div class="card dark-card">
        <h2>Wetter für Frankfurt</h2>
        <div class="weather-info">
            <div>
                <!-- Platzhalter für Wetter-Icon. n8n kann hier die dynamische URL einfügen. -->
                <img src="https://openweathermap.org/img/wn/04d.png" alt="Bewölkt" class="weather-icon">
                <div>
                    <!-- Platzhalter für Temperatur. n8n kann hier den dynamischen Wert einfügen. -->
                    <span class="weather-temp">15°C</span>
                    <!-- Platzhalter für Wetterbeschreibung. n8n kann hier den dynamischen Wert einfügen. -->
                    <p class="weather-desc">Leicht bewölkt</p>
                </div>
            </div>
            <div class="weather-details">
                <!-- Platzhalter für Wind. n8n kann hier den dynamischen Wert einfügen. -->
                <p>Wind: 12 km/h</p>
                <!-- Platzhalter für Luftfeuchtigkeit. n8n kann hier den dynamischen Wert einfügen. -->
                <p>Luftfeuchte: 70%</p>
            </div>
        </div>
    </div>

    <!-- Wetterkarte für Offenbach Bieber -->
    <div class="card dark-card">
        <h2>Wetter für Offenbach Bieber</h2>

            <div>

                <img src="https://openweathermap.org/img/wn/03d.png" alt="Sonnig" class="weather-icon">
                <div>
                    <!-- Platzhalter für Temperatur. n8n kann hier den dynamischen Wert einfügen. -->
                    <span class="weather-temp">16°C</span>
                    <!-- Platzhalter für Wetterbeschreibung. n8n kann hier den dynamischen Wert einfügen. -->
                    <p class="weather-desc">Sonnig mit Wolken</p>
                </div>
            </div>
            <div class="weather-details">
                <!-- Platzhalter für Wind. n8n kann hier den dynamischen Wert einfügen. -->
                <p>Wind: 10 km/h</p>
                <!-- Platzhalter für Luftfeuchtigkeit. n8n kann hier den dynamischen Wert einfügen. -->
                <p>Luftfeuchte: 65%</p>
            </div>
        </div>
    </div>

    <div class="card">
        <strong style="display: block; margin-bottom: 15px;">Preisvergleich Tankstellen</strong>

    </div>

</body>
</html>
