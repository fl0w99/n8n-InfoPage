<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dein Täglicher Bericht</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background-color: #f8f9fa; /* Light background */
            color: #212529; /* Dark text */
            line-height: 1.6;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h1 { font-size: 24px; margin-bottom: 8px; color: #1a73e8; }
        h2 { font-size: 20px; margin-top: 0; margin-bottom: 15px; color: #212529; }
        .date { color: #6c757d; font-size: 14px; margin-bottom: 24px; }
        .gemini-text { font-size: 16px; white-space: pre-line; }
        #chart { width: 100%; height: 400px; }
        .footer { text-align: center; font-size: 12px; color: #adb5bd; margin-top: 20px; }
        
        /* Macht die Legende auf dem Handy schöner */
        .legendtext { font-size: 12px !important; }

        /* Spezifische Stile für neue Kacheln */
        .weather-info {
            display: flex;
            align-items: center;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .weather-icon {
            font-size: 40px;
            margin-right: 15px;
            line-height: 1; /* Emoji vertikal ausrichten */
        }
        .weather-details {
            display: flex;
            flex-direction: column;
        }
        .weather-temp {
            font-size: 28px;
            font-weight: bold;
            color: #1a73e8;
        }
        .wing-status {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .status-available { background-color: #28a745; } /* Green */
        .status-unavailable { background-color: #dc3545; } /* Red */
        .status-unknown { background-color: #ffc107; } /* Yellow */
        .wing-link {
            display: block;
            margin-top: 10px;
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }
        .wing-link:hover {
            text-decoration: underline;
        }
        .analysis-recommendation {
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            display: inline-block;
            color: white; /* Textfarbe für Empfehlungs-Hintergrund */
        }
        .analysis-text {
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Guten Morgen!</h1>
    <div class="date" id="reportDate"></div>

    <!-- Kachel 1: Das Wetter -->
    <div class="card">
        <h2>Wetter heute</h2>
        <div class="weather-info">
            <span class="weather-icon" id="weatherIcon"></span>
            <div class="weather-details">
                <span class="weather-temp" id="weatherTemp"></span>
                <span id="weatherCondition"></span>
            </div>
        </div>
        <div style="font-size: 14px; color: #6c757d;">Wind: <span id="windInfo"></span> • Regenrisiko: <span id="rainRisk"></span></div>
    </div>

    <!-- Kachel 2: Behringer Wing Rack B-Ware Verfügbarkeit -->
    <div class="card">
        <h2>Behringer Wing Rack B-Ware</h2>
        <div class="wing-status">
            <span class="status-indicator" id="wingStatusIndicator"></span>
            <span id="wingAvailabilityText">Prüfe Verfügbarkeit...</span>
        </div>
        <a href="https://www.thomann.de/de/behringer_wing_rack_b_stock.htm" target="_blank" class="wing-link">
            Zum Produkt bei Thomann &rarr;
        </a>
    </div>

    <!-- Original Plotly Chart Kachel -->
    <div class="card">
        <strong style="display: block; margin-bottom: 15px;">Preisvergleich Tankstellen</strong>
        <div id="chart"></div>
    </div>

    <!-- Kachel 3: Spritpreis-Analyse -->
    <div class="card">
        <h2>Spritpreis-Analyse</h2>
        <div class="analysis-text" id="fuelAnalysisText"></div>
        <div class="analysis-recommendation" id="fuelRecommendation"></div>
    </div>

    <div class="footer">Generiert von n8n & Gemini AI • Datenquelle: SQL DB</div>

    <script>
        // Datum dynamisch setzen
        document.getElementById('reportDate').textContent = new Date().toLocaleDateString('de-DE', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        // Platzhalterdaten für Wetter (im realen Szenario von n8n gefüllt)
        const weatherData = {
            icon: '☀️', /* Beispiel: ☁️, 🌧️, ❄️ */
            temp: '22°C',
            condition: 'Sonnig, klar',
            wind: '10 km/h aus NO',
            rainRisk: '0%'
        };
        document.getElementById('weatherIcon').textContent = weatherData.icon;
        document.getElementById('weatherTemp').textContent = weatherData.temp;
        document.getElementById('weatherCondition').textContent = weatherData.condition;
        document.getElementById('windInfo').textContent = weatherData.wind;
        document.getElementById('rainRisk').textContent = weatherData.rainRisk;

        // Platzhalterdaten für Behringer Wing Rack (im realen Szenario von n8n gefüllt)
        // Hier wird die Verfügbarkeit zur Demo zufällig festgelegt.
        const isWingAvailable = Math.random() < 0.5; // Simuliert 50% Chance
        const wingAvailabilityText = document.getElementById('wingAvailabilityText');
        const wingStatusIndicator = document.getElementById('wingStatusIndicator');

        if (isWingAvailable) {
            wingAvailabilityText.textContent = 'Verfügbar!';
            wingStatusIndicator.classList.add('status-available');
        } else {
            wingAvailabilityText.textContent = 'Derzeit nicht verfügbar.';
            wingStatusIndicator.classList.add('status-unavailable');
        }

        // Plotly Chart Skript (ursprünglicher Inhalt)
        const traces = [{"name":"Shell Kickers","x":["2026-03-25 02:00:58","2026-03-24 23:01:00","2026-03-24 20:01:03","2026-03-24 17:00:57","2026-03-24 14:00:58","2026-03-24 11:01:03","2026-03-24 08:00:58","2026-03-24 05:00:58","2026-03-24 02:00:58","2026-03-23 23:00:58","2026-03-23 20:00:58","2026-03-23 17:00:58","2026-03-23 14:00:59","2026-03-23 11:00:58","2026-03-23 08:00:59","2026-03-23 05:00:58","2026-03-23 02:00:58","2026-03-22 23:00:58","2026-03-22 20:00:58","2026-03-22 17:01:02","2026-03-22 14:01:00","2026-03-22 11:00:58","2026-03-22 08:00:58","2026-03-22 05:00:58","2026-03-22 02:00:58","2026-03-21 23:01:02","2026-03-21 20:00:58","2026-03-21 17:00:58","2026-03-21 14:01:03","2026-03-21 11:01:02","2026-03-21 08:00:58","2026-03-21 05:00:57","2026-03-21 02:00:58","2026-03-20 23:00:59","2026-03-20 20:00:58","2026-03-20 17:00:58","2026-03-20 14:00:59","2026-03-20 11:00:59","2026-03-20 08:00:58","2026-03-20 05:01:00","2026-03-20 02:00:58","2026-03-19 23:00:59","2026-03-19 20:00:59","2026-03-19 17:00:58","2026-03-19 14:00:58","2026-03-19 11:00:58","2026-03-19 08:00:59","2026-03-19 05:00:58","2026-03-19 02:00:58","2026-03-18 23:00:59"],"y":[2.069,2.069,2.069,2.029,2.099,2.059,2.089,2.069,2.069,2.069,2.089,2.049,2.119,2.069,2.119,2.099,2.099,2.099,2.089,2.059,2.079,2.049,2.139,2.079,2.079,2.079,2.079,2.049,2.089,2.049,2.129,2.089,2.089,2.089,2.099,2.059,2.129,2.089,2.179,2.109,2.109,2.109,2.109,2.059,2.119,2.059,2.109,2.099,2.099,2.099],"type":"scatter","mode":"lines+markers","line":{"shape":"spline"},"connectgaps":true},{"name":"Jet Ringcenter","x":["2026-03-25 02:00:57","2026-03-24 23:00:57","2026-03-24 20:00:57","2026-03-24 17:00:57","2026-03-24 14:00:57","2026-03-24 11:00:57","2026-03-24 08:00:57","2026-03-24 05:00:57","2026-03-24 02:00:57","2026-03-23 23:00:57","2026-03-23 20:00:57","2026-03-23 17:00:57","2026-03-23 14:00:57","2026-03-23 11:00:57","2026-03-23 08:00:57","2026-03-23 05:00:57","2026-03-23 02:00:57","2026-03-22 23:00:57","2026-03-22 20:00:57","2026-03-22 17:00:57","2026-03-22 14:00:57","2026-03-22 11:00:57","2026-03-22 08:00:57","2026-03-22 05:00:57","2026-03-22 02:00:57","2026-03-21 23:00:57","2026-03-21 20:00:57","2026-03-21 17:00:57","2026-03-21 14:00:57","2026-03-21 11:00:57","2026-03-21 08:00:57","2026-03-21 05:00:57","2026-03-21 02:00:57","2026-03-20 23:00:57","2026-03-20 20:00:57","2026-03-20 17:00:57","2026-03-20 14:00:57","2026-03-20 11:00:57","2026-03-20 08:00:57","2026-03-20 05:00:57","2026-03-20 02:00:57","2026-03-19 23:00:57","2026-03-19 20:00:57","2026-03-19 17:00:57","2026-03-19 14:00:57","2026-03-19 11:00:57","2026-03-19 08:00:57","2026-03-19 05:00:57","2026-03-19 02:00:57","2026-03-18 23:00:57"],"y":[2.029,2.029,2.049,2.039,2.119,2.059,2.069,2.069,2.039,2.039,2.069,2.039,2.089,2.069,2.119,2.059,2.029,2.029,2.049,2.039,2.069,2.039,2.119,2.059,2.029,2.029,2.049,2.039,2.059,2.039,2.039,2.089,2.059,2.059,2.069,2.049,2.119,2.099,2.119,2.099,2.069,2.069,2.089,2.069,2.129,2.079,2.089,2.069,2.039,2.039],"type":"scatter","mode":"lines+markers","line":{"shape":"spline"},"connectgaps":true}];

        const layout = {
            margin: { t: 10, b: 80, l: 60, r: 20 },
            showlegend: true,
            legend: {
                orientation: 'h',
                y: -0.3,
                x: 0.5,
                xanchor: 'center'
            },
            xaxis: {
                type: 'date',
                gridcolor: '#eee',
                tickformat: '%d.%m\n%H:%M',
                autorange: true
            },
            yaxis: {
                title: 'Preis (€)',
                gridcolor: '#eee',
                // Zeigt 3 Nachkommastellen an (typisch für Tankstellen)
                tickformat: ',.3f', 
                autorange: true
            },
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            autosize: true
        };

        const config = {
            responsive: true,
            displayModeBar: false
        };

        // Chart erstellen
        Plotly.newPlot('chart', traces, layout, config);


        // --- Spritpreis-Analyse Skript ---
        // Funktion zur Analyse der Spritpreise und Empfehlungen
        function analyzeFuelPrices(traces) {
            let allPrices = [];
            let priceByHour = {}; // Speichert {Stunde: [Preise]}

            // Alle Preise sammeln und nach Stunden gruppieren
            traces.forEach(trace => {
                for (let i = 0; i < trace.x.length; i++) {
                    const date = new Date(trace.x[i]);
                    const hour = date.getHours();
                    const price = trace.y[i];

                    allPrices.push(price);

                    if (!priceByHour[hour]) {
                        priceByHour[hour] = [];
                    }
                    priceByHour[hour].push(price);
                }
            });

            if (allPrices.length === 0) {
                return {
                    analysis: "Keine Daten verfügbar für die Spritpreisanalyse.",
                    recommendation: "Unbekannt",
                    recommendationColor: "#6c757d"
                };
            }

            const minOverallPrice = Math.min(...allPrices);
            const maxOverallPrice = Math.max(...allPrices);

            // Durchschnittlichen Preis pro Stunde berechnen
            let avgPriceByHour = [];
            for (let hour = 0; hour < 24; hour++) {
                if (priceByHour[hour] && priceByHour[hour].length > 0) {
                    const sum = priceByHour[hour].reduce((a, b) => a + b, 0);
                    avgPriceByHour.push({ hour: hour, avg: sum / priceByHour[hour].length });
                }
            }

            avgPriceByHour.sort((a, b) => a.avg - b.avg); // Nach Durchschnittspreis sortieren, um die günstigsten zu finden
            
            let cheapestHoursInfo = [];
            if (avgPriceByHour.length > 0) {
                const minAvgPrice = avgPriceByHour[0].avg;
                // Alle Stunden sammeln, die innerhalb eines kleinen Schwellenwerts des Mindestdurchschnittspreises liegen
                cheapestHoursInfo = avgPriceByHour.filter(item => (item.avg - minAvgPrice) / minAvgPrice < 0.01); // innerhalb von 1% des günstigsten Preises
            }

            let analysisText = `Die Spritpreise schwankten im beobachteten Zeitraum zwischen ${minOverallPrice.toFixed(3)}€ und ${maxOverallPrice.toFixed(3)}€ pro Liter. `;

            if (cheapestHoursInfo.length > 0) {
                const hours = cheapestHoursInfo.map(item => item.hour).sort((a, b) => a - b);
                let formattedHours = "";
                if (hours.length === 1) {
                    formattedHours = `${hours[0]}:00 Uhr`;
                } else if (hours.length === 2) {
                    formattedHours = `${hours[0]}:00 Uhr und ${hours[1]}:00 Uhr`;
                } else {
                    formattedHours = `${hours[0]}:00 Uhr bis ca. ${hours[hours.length - 1]}:00 Uhr`;
                }
                analysisText += `Historisch sind die günstigsten Tankzeiten häufig zwischen ${formattedHours}. `;
            } else {
                analysisText += `Es konnten keine klaren tageszeitlichen Muster für günstigere Preise identifiziert werden. `;
            }

            // Die neuesten Preise aller Tankstellen abrufen
            let latestPricesAcrossStations = traces.map(trace => {
                // Annahme: Traces sind vom neuesten zum ältesten sortiert.
                // Ansonsten müsste man das Maximum des Zeitstempels (x) für jede Spur finden.
                return trace.y.length > 0 ? trace.y[0] : null;
            }).filter(price => price !== null);

            let currentAvgPrice = latestPricesAcrossStations.length > 0 
                                ? latestPricesAcrossStations.reduce((a, b) => a + b, 0) / latestPricesAcrossStations.length 
                                : null;

            let recommendation = "Beobachten";
            let recommendationColor = "#ffc107"; // Orange (gelb)

            if (currentAvgPrice !== null && avgPriceByHour.length > 0) {
                const lowestAvgOverall = avgPriceByHour[0].avg;
                const highestAvgOverall = avgPriceByHour[avgPriceByHour.length - 1].avg;

                // Schwellenwerte für Empfehlungen definieren
                const cheapThreshold = lowestAvgOverall * 1.01; // Innerhalb von 1% des absolut niedrigsten Durchschnitts
                const expensiveThreshold = highestAvgOverall * 0.99; // Innerhalb von 1% des absolut höchsten Durchschnitts

                if (currentAvgPrice <= cheapThreshold) {
                    recommendation = "Jetzt tanken!";
                    recommendationColor = "#28a745"; // Grün
                    analysisText += `Die aktuellen Preise liegen im sehr günstigen Bereich!`;
                } else if (currentAvgPrice >= expensiveThreshold) {
                    recommendation = "Besser warten!";
                    recommendationColor = "#dc3545"; // Rot
                    analysisText += `Die aktuellen Preise sind eher hoch. Es lohnt sich, noch etwas zu warten.`;
                } else {
                    recommendation = "Beobachten";
                    recommendationColor = "#ffc107"; // Orange
                    analysisText += `Die Preise liegen im mittleren Bereich. Ein Abwarten könnte sich lohnen.`;
                }
            } else {
                analysisText += `Keine ausreichenden Daten für eine fundierte Preisprognose.`;
            }

            // Die insgesamt günstigste Tankstelle unter den aktuellen Preisen finden
            let cheapestStationName = "N/A";
            let cheapestStationPrice = Infinity;
            traces.forEach(trace => {
                if (trace.y.length > 0 && trace.y[0] < cheapestStationPrice) {
                    cheapestStationPrice = trace.y[0];
                    cheapestStationName = trace.name;
                }
            });

            if (cheapestStationName !== "N/A") {
                analysisText += ` Die derzeit günstigste Tankstelle ist **${cheapestStationName}** mit ${cheapestStationPrice.toFixed(3)}€/L.`;
            }

            return {
                analysis: analysisText,
                recommendation: recommendation,
                recommendationColor: recommendationColor
            };
        }

        // Analyse ausführen und Kachel aktualisieren
        const fuelAnalysisResult = analyzeFuelPrices(traces);
        document.getElementById('fuelAnalysisText').innerHTML = fuelAnalysisResult.analysis;
        document.getElementById('fuelRecommendation').textContent = fuelAnalysisResult.recommendation;
        document.getElementById('fuelRecommendation').style.backgroundColor = fuelAnalysisResult.recommendationColor;

    </script>
